server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Angular — HTML5 pushState routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the main backend
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Proxy WebSocket to main backend
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Proxy to execution service
    location /execution-api/ {
        rewrite ^/execution-api/(.*) /api/v1/execution/$1 break;
        proxy_pass http://execution-service:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # WebSocket for execution output streaming
    location /ws/execution/ {
        proxy_pass http://execution-service:8085;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
