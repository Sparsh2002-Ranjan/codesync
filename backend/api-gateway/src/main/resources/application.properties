# ═══════════════════════════════════════════════
#  CodeSync API Gateway - application.properties
# ═══════════════════════════════════════════════

server.port=8080
spring.application.name=api-gateway

# ── Route: Auth Service ─────────────────────────
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

# ── Route: Admin (handled by Auth Service) ──────
spring.cloud.gateway.routes[1].id=admin-service
spring.cloud.gateway.routes[1].uri=http://localhost:8081
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/admin/**

# ── Route: Project Service ──────────────────────
spring.cloud.gateway.routes[2].id=project-service
spring.cloud.gateway.routes[2].uri=http://localhost:8082
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/projects/**

# ── Route: File Service ─────────────────────────
spring.cloud.gateway.routes[3].id=file-service
spring.cloud.gateway.routes[3].uri=http://localhost:8083
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/files/**

# ── Route: Collaboration Service ────────────────
spring.cloud.gateway.routes[4].id=collaboration-service
spring.cloud.gateway.routes[4].uri=http://localhost:8084
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/sessions/**

# ── Route: Version Service ──────────────────────
spring.cloud.gateway.routes[5].id=version-service
spring.cloud.gateway.routes[5].uri=http://localhost:8085
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/versions/**

# ── Route: Execution Service ────────────────────
spring.cloud.gateway.routes[6].id=execution-service
spring.cloud.gateway.routes[6].uri=http://localhost:8086
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/execution/**

# ── Route: Comment Service ──────────────────────
spring.cloud.gateway.routes[7].id=comment-service
spring.cloud.gateway.routes[7].uri=http://localhost:8087
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/comments/**

# ── Route: Notification Service ─────────────────
spring.cloud.gateway.routes[8].id=notification-service
spring.cloud.gateway.routes[8].uri=http://localhost:8088
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/v1/notifications/**

# ── Route: WebSocket (Collaboration) ────────────
spring.cloud.gateway.routes[9].id=websocket-collab
spring.cloud.gateway.routes[9].uri=ws://localhost:8084
spring.cloud.gateway.routes[9].predicates[0]=Path=/ws/collab/**

# ── Route: WebSocket (Notifications) ────────────
spring.cloud.gateway.routes[10].id=websocket-notifications
spring.cloud.gateway.routes[10].uri=ws://localhost:8088
spring.cloud.gateway.routes[10].predicates[0]=Path=/ws/notifications/**

# ── Route: General WebSocket fallback ───────────
spring.cloud.gateway.routes[11].id=websocket
spring.cloud.gateway.routes[11].uri=ws://localhost:8084
spring.cloud.gateway.routes[11].predicates[0]=Path=/ws/**

# ── Route: Swagger docs per service ─────────────
spring.cloud.gateway.routes[12].id=swagger-auth
spring.cloud.gateway.routes[12].uri=http://localhost:8081
spring.cloud.gateway.routes[12].predicates[0]=Path=/swagger-ui/**,/api-docs/**,/swagger-ui.html

# ── Route: Actuator Aggregation ─────────────────
spring.cloud.gateway.routes[13].id=actuator-auth
spring.cloud.gateway.routes[13].uri=http://localhost:8081
spring.cloud.gateway.routes[13].predicates[0]=Path=/actuator/auth/**
spring.cloud.gateway.routes[13].filters[0]=StripPrefix=1

# ── Global CORS ─────────────────────────────────
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=http://localhost:4200,http://localhost:4201
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true

# ── Actuator ────────────────────────────────────
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.enabled=true
info.app.name=api-gateway
info.app.description=CodeSync API Gateway - Routes all traffic to microservices
info.app.port=8080

# ── Logging ─────────────────────────────────────
logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty=INFO
