server.port=8085

spring.application.name=execution-service

# ── MySQL Database (matches main backend) ────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/codesync_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Resource limits per sandbox container ────────────────────────
execution.limits.cpu=0.5
execution.limits.memory-mb=128
execution.limits.timeout-seconds=15
execution.limits.max-output-bytes=65536

# ── Docker ───────────────────────────────────────────────────────
execution.docker.network=none
execution.docker.socket=/var/run/docker.sock

# ── JWT (must match main backend exactly) ────────────────────────
jwt.secret=CodeSyncSecretKey2026VeryLongSecretKeyForJWTSigning123456789
jwt.expiration=86400000

# ── CORS ─────────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:4200
