# ═══════════════════════════════════════════════
#  CodeSync Backend - application.properties
# ═══════════════════════════════════════════════

# Server
server.port=8080
spring.application.name=codesync-backend

# ── MySQL Database ──────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/codesync_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ─────────────────────────────────────────
jwt.secret=CodeSyncSecretKey2026VeryLongSecretKeyForJWTSigning123456789
jwt.expiration=86400000

# ── File Upload ──────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── CORS (allow Angular frontend) ───────────────
cors.allowed-origins=http://localhost:4200

# ── Swagger UI ───────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# ── Logging ──────────────────────────────────────
logging.level.com.codesync=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web.socket=DEBUG
